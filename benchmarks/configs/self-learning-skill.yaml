suite: self-learning-skill

run:
  name: self-learning-skill-default
  description: Self-learning Skill evaluation default configuration
  generate_run_id: true
  random_seed: 42

model:
  provider: anthropic
  name: MiniMax-M2.5-highspeed
  temperature: 0
  max_tokens: 8192

runtime:
  network: enabled
  workspace_mode: temp-dir
  max_concurrency: 1
  learning_timeout_sec: 180
  reuse_task_timeout_sec: 180
  max_tool_rounds: 40
  allow_writes_outside_workspace: false

selection:
  include_cases: []
  exclude_cases: []

paths:
  fixtures_root: benchmarks/fixtures/self-learning-skill
  runs_root: benchmarks/runs
  reports_root: benchmarks/reports

scoring:
  phase_weights:
    learning_generation: 0.30
    skill_quality: 0.30
    reuse_effect: 0.40
  learning_generation:
    trigger_correctness: 0.20
    action_correctness: 0.20
    target_correctness: 0.15
    key_experience_recall: 0.30
    noise_suppression: 0.15
  skill_quality:
    format_schema: 0.15
    correctness: 0.25
    clarity: 0.15
    reusability: 0.20
    specificity: 0.15
    safety_verification: 0.10
  reuse_effect:
    task_success_delta: 0.30
    skill_load_correctness: 0.15
    efficiency_delta: 0.20
    guidance_adherence: 0.20
    harm_avoidance: 0.15

judge:
  learning:
    provider: anthropic
    model: MiniMax-M2.5-highspeed
    prompt_file: benchmarks/configs/judge/self-learning-skill-learning.prompt.md
  quality:
    provider: anthropic
    model: MiniMax-M2.5-highspeed
    prompt_file: benchmarks/configs/judge/self-learning-skill-quality.prompt.md
  reuse:
    provider: anthropic
    model: MiniMax-M2.5-highspeed
    prompt_file: benchmarks/configs/judge/self-learning-skill-reuse.prompt.md

trace:
  format: jsonl
  record_tool_calls: true
  record_skill_loads: true
  record_file_reads: true
  record_file_writes: true
  record_shell_commands: true
  record_acceptance_checks: true
  record_token_usage: true
  record_approval_events: true
  record_learning_events: true
